<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work Slate Timer</title>
    <link rel="stylesheet" href="./floating-timer.css" />
  </head>
  <body>
    <main class="floating-timer" role="button" tabindex="0" aria-label="Open Work Slate">
      <div class="timer-status">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="timerLabel">Focus</span>
      </div>
      <p id="timerValue" role="timer">00:00:00</p>
    </main>
    <script src="./floating-timer.js"></script>
  </body>
</html>
